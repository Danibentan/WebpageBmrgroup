<!doctype html>
<html lang="es">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMR Group | Configurador de Ventanas Premium</title>
    <meta name="description" content="Configurador interactivo de ventanas premium BMR Group." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {

              bmrOrange: '#FF6512'

            boxShadow: {
              premium: '0 20px 50px rgba(7, 20, 34, 0.35)'

        }
      };

  </head>
  <body class="bg-slate-100">

    <script type="text/babel" src="app.js"></script>

</html>
